<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בראול כפל - אליפות הכיתה!</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a2a6c; color: white; text-align: center; padding: 20px; }
        .card { background: #fdbb2d; border-radius: 20px; padding: 20px; color: #333; max-width: 400px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .brawler-img { font-size: 50px; margin: 10px; }
        input { width: 60px; padding: 10px; font-size: 20px; border-radius: 10px; border: none; text-align: center; }
        button { background: #ff4b2b; color: white; border: none; padding: 10px 20px; font-size: 18px; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 50px; }
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 10px;
        }
        #streak-container, #character-container {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc00; /* Gold color */
            text-shadow: 1px 1px 2px #000;
            transition: transform 0.2s ease-in-out;
        }
        /* Confetti styles */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00; /* Default color, will be randomized */
            animation: fall linear forwards;
            z-index: 100;
            pointer-events: none; /* Allow clicks/touches to pass through */
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .inventory { margin-top: 30px; display: flex; flex-wrap: wrap; justify-content: center; }
        .item { background: rgba(255,255,255,0.2); margin: 5px; padding: 10px; border-radius: 10px; border: 1px solid gold; }

        /* K-Pop Demon Hunter Theme Overrides */
        body.theme-demons {
            background: linear-gradient(to bottom, #430d4b, #1e082b);
        }
        .theme-demons .card {
            background: linear-gradient(145deg, #a853b8, #3d1d54);
            color: white;
        }
        .theme-demons .item {
            border-color: #ff00ff; /* Fuchsia */
        }
        .theme-demons #streak-container, .theme-demons #character-container {
            color: #f0f; /* Fuchsia */
        }

        /* Modal Styles */
        #settings-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 24px;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            padding: 0;
            margin: 0;
        }
        #store-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            padding: 0;
            margin: 0;
        }
        .modal {
            display: none; /* Hidden by default */
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.7); 
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #333;
            border: 2px solid #fdbb2d;
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
            color: white;
            text-align: right; /* For Hebrew labels */
            position: relative;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #fdbb2d; }
        .setting-group select { width: 100%; padding: 8px; border-radius: 5px; background: #555; color: white; border: 1px solid #777; font-size: 16px; }

        #modal-reset-btn {
            width: 100%;
            background: #c0392b;
            margin-top: 10px;
        }
        #modal-ok-btn {
            width: 100%;
            background: #27ae60; /* Green */
            margin-top: 20px;
        }
        .theme-demons .modal-content {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }
        .theme-demons .setting-group label {
            color: #ff00ff;
        }
        .store-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .store-item span { font-size: 20px; }
        .store-item button {
            margin: 0;
            padding: 5px 10px;
            font-size: 14px;
            background: #e67e22; /* Orange */
        }
        .store-item button.buy-btn {
            background: #27ae60; /* Green */
        }
    </style>
</head>
<body>
    <button id="settings-btn">⚙️</button>
    <button id="store-btn">🏪</button>

    <h1 id="main-title">🌵 BRAWL MULTIPLY 🌵</h1>
    <p id="subtitle">פתור תרגילים וזכה בבראולרים נדירים!</p>

    <div class="stats-container">
        <div id="streak-container">🔥 רצף: <span id="streak-counter">0</span></div>
        <div id="character-container">🎒 דמויות: <span id="character-counter">0</span></div>
    </div>

    <div class="card">
        <h2 id="question" dir="ltr">טוען תרגיל...</h2>
        <input type="number" id="answer" placeholder="?" onkeypress="if(event.key==='Enter') checkAnswer()">
        <br>
        <button id="submit-btn" onclick="checkAnswer()">פתח תיבה! 🎁</button>
        <div id="feedback"></div>
    </div>

    <h3 id="collection-title" style="margin-top: 20px;">האוסף שלי:</h3>
    <div class="inventory" id="inventory"></div>

    <h3 id="trophy-collection-title" style="margin-top: 20px;">גביעי האליפות שלי:</h3>
    <div class="inventory" id="trophy-inventory"></div>

    <!-- Store Modal -->
    <div id="store-modal" class="modal">
        <div class="modal-content">
            <h2>חנות הגביעים</h2>
            <p>השתמש בדמויות שאספת כדי לקנות גביעי אליפות!</p>
            <div id="store-buy-items-container" style="max-height: 40vh; overflow-y: auto; padding: 5px;"></div>
            <button id="store-close-btn" style="width:100%; background:#c0392b; margin-top:20px;">סגור</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>הגדרות</h2>
            
            <div class="setting-group">
                <label for="theme-select">ערכת נושא:</label>
                <select id="theme-select">
                    <option value="brawlers">Brawl Stars</option>
                    <option value="demons">K-Pop Demon Hunters</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="mode-select">סוג תרגיל:</label>
                <select id="mode-select">
                    <option value="multiply">כפל</option>
                    <option value="chain">שרשרת (+/-)</option>
                </select>
            </div>
            
            <button id="modal-reset-btn" onclick="resetCollection()">איפוס אוסף נוכחי 🔄</button>
            
            <button id="modal-ok-btn">אישור</button>
        </div>
    </div>

    <script>
        const brawlers = [
            {name: "Shelly", icon: "🔫"}, {name: "Colt", icon: "🤠"}, 
            {name: "El Primo", icon: "💪"}, {name: "Poco", icon: "🎸"}, 
            {name: "Spike", icon: "🌵"}, {name: "Crow", icon: "🐦"},
            {name: "Leon", icon: "🦎"}, {name: "Mortis", icon: "🦇"}
        ];

        const demonHunters = [
            {name: "Jin", icon: "🎤"}, {name: "Sora", icon: "⚔️"}, 
            {name: "Kai", icon: "🔮"}, {name: "Luna", icon: "🌙"}, 
            {name: "Kenji", icon: "🦊"}, {name: "Yuki", icon: "❄️"},
            {name: "Ren", icon: "🔥"}, {name: "Aya", icon: "💎"}
        ];

        const specialTrophies = [
            { id: 'gold_cup', name: 'גביע הזהב', icon: '🏆', price: 10 },
            { id: 'diamond_cup', name: 'גביע היהלום', icon: '💎', price: 25 },
            { id: 'legend_cup', name: 'גביע האגדות', icon: '👑', price: 50 },
            { id: 'master_cup', name: 'גביע המאסטר', icon: '🌟', price: 100 },
            { id: 'champion_cup', name: 'גביע האליפות', icon: '🏅', price: 250 },
            { id: 'grandmaster_cup', name: 'גביע הגראנדמאסטר', icon: '✨', price: 500 },
            { id: 'ultimate_cup', name: 'הגביע האולטימטיבי', icon: '🌌', price: 1000 }
        ];

        let currentNum1, currentNum2;
        let currentMode = 'multiply';
        let currentTheme = 'brawlers';
        let correctAnswer;
        let streakCounter = 0; // Counter for correct answer streak
        let purchasedTrophies = [];
        let inventories = { brawlers: [], demons: [] };

        // Modal elements
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const storeBtn = document.getElementById('store-btn');
        const storeModal = document.getElementById('store-modal');
        const storeCloseBtn = document.getElementById('store-close-btn');
        const themeSelect = document.getElementById('theme-select');
        const modeSelect = document.getElementById('mode-select');
        const modalOkBtn = document.getElementById('modal-ok-btn');

        // --- Data Persistence ---

        function loadProgress() {
            const saved = localStorage.getItem('mathGameProgress');
            if (saved) {
                const data = JSON.parse(saved);
                inventories = data.inventories || { brawlers: [], demons: [] };
                purchasedTrophies = data.purchasedTrophies || [];
                // Ensure both keys exist to prevent errors if loading old data
                if (!inventories.brawlers) inventories.brawlers = [];
                if (!inventories.demons) inventories.demons = [];
            }
        }

        function saveProgress() {
            const progress = {
                inventories: inventories,
                purchasedTrophies: purchasedTrophies
            };
            localStorage.setItem('mathGameProgress', JSON.stringify(progress));
        }

        function displayCurrentInventory() {
            const inv = document.getElementById('inventory');
            inv.innerHTML = '';
            const currentCollection = inventories[currentTheme] || [];
            currentCollection.forEach(reward => {
                const item = document.createElement('div');
                item.className = 'item';
                item.innerHTML = `${reward.icon}<br>${reward.name}`;
                inv.appendChild(item);
            });
        }

        function displayPurchasedTrophies() {
            const trophyInv = document.getElementById('trophy-inventory');
            trophyInv.innerHTML = '';
            purchasedTrophies.forEach(trophyId => {
                const trophyData = specialTrophies.find(t => t.id === trophyId);
                if (trophyData) {
                    const item = document.createElement('div');
                    item.className = 'item';
                    item.style.borderColor = '#fff';
                    item.style.background = 'linear-gradient(145deg, #f0c24b, #d49c0d)';
                    item.innerHTML = `<span style="font-size: 30px;">${trophyData.icon}</span><br>${trophyData.name}`;
                    trophyInv.appendChild(item);
                }
            });
        }

        function updateCharacterCountDisplay() {
            const count = inventories[currentTheme] ? inventories[currentTheme].length : 0;
            document.getElementById('character-counter').innerText = count;
        }

        function resetCollection() {
            if (confirm('האם לאפס את האוסף הנוכחי? הפעולה בלתי הפיכה.')) {
                inventories[currentTheme] = [];
                saveProgress();
                displayCurrentInventory();
                updateCharacterCountDisplay();
            }
        }

        // --- Settings Modal Logic ---
        function openSettings() {
            // Sync selects with current state
            themeSelect.value = currentTheme;
            modeSelect.value = currentMode;
            settingsModal.style.display = 'flex';
        }

        function openStore() {
            // Populate Buy Tab
            const storeBuyContainer = document.getElementById('store-buy-items-container');
            storeBuyContainer.innerHTML = '';
            const collectionSize = inventories[currentTheme].length;

            specialTrophies.forEach(trophy => {
                const itemEl = document.createElement('div');
                itemEl.className = 'store-item';
                const isOwned = purchasedTrophies.includes(trophy.id);
                const canAfford = collectionSize >= trophy.price;
                
                let buttonHtml;
                if (isOwned) {
                    buttonHtml = '<button disabled>בבעלותך</button>';
                } else if (canAfford) {
                    buttonHtml = `<button class="buy-btn" onclick="buySpecialTrophy('${trophy.id}')">קנה (${trophy.price} דמויות)</button>`;
                } else {
                    buttonHtml = `<button disabled>צריך ${trophy.price} דמויות</button>`;
                }

                itemEl.innerHTML = `
                    <span style="font-size: 24px;">${trophy.icon} ${trophy.name}</span>
                    ${buttonHtml}
                `;
                storeBuyContainer.appendChild(itemEl);
            });

            storeModal.style.display = 'flex';
        }

        function closeStore() {
            storeModal.style.display = 'none';
        }

        function buySpecialTrophy(trophyId) {
            const trophyToBuy = specialTrophies.find(t => t.id === trophyId);
            if (!trophyToBuy) return;

            const currentCollection = inventories[currentTheme];
            const isOwned = purchasedTrophies.includes(trophyId);
            const canAfford = currentCollection.length >= trophyToBuy.price;

            if (!isOwned && canAfford) {
                // "Spend" characters by removing them from the start of the array
                currentCollection.splice(0, trophyToBuy.price);
                
                purchasedTrophies.push(trophyId);
                
                saveProgress();
                displayCurrentInventory(); // Refresh inventory view to show removed characters
                displayPurchasedTrophies();
                updateCharacterCountDisplay();
                openStore(); // Refresh store view to update button states
            }
        }

        function applyAndCloseSettings() {
            const newTheme = themeSelect.value;
            const newMode = modeSelect.value;

            // Update global state
            currentTheme = newTheme;
            currentMode = newMode;

            // Update UI based on new state
            if (currentTheme === 'brawlers') {
                document.body.classList.remove('theme-demons');
                document.getElementById('main-title').innerText = '🌵 BRAWL MULTIPLY 🌵';
                document.getElementById('subtitle').innerText = 'פתור תרגילים וזכה בבראולרים נדירים!';
                document.getElementById('collection-title').innerText = 'האוסף שלי:';
            } else {
                document.body.classList.add('theme-demons');
                document.getElementById('main-title').innerText = '🎤 K-POP DEMON HUNTERS 🎤';
                document.getElementById('subtitle').innerText = 'פתור תרגילים וגייס ציידי שדים אגדיים!';
                document.getElementById('collection-title').innerText = 'הלהקה שלי:';
            }
            displayCurrentInventory();
            displayPurchasedTrophies();
            updateCharacterCountDisplay();

            // Reset streak and get new question
            streakCounter = 0;
            updateStreakDisplay();
            newQuestion();

            settingsModal.style.display = 'none';
        }

        function newQuestion() {
            if (currentMode === 'multiply') {
                currentNum1 = Math.floor(Math.random() * 5) + 1; // כיתה א' - מתחילים קל (1-5)
                currentNum2 = Math.floor(Math.random() * 10) + 1;
                correctAnswer = currentNum1 * currentNum2;
                document.getElementById('question').innerText = `${currentNum1} × ${currentNum2} =`;
            } else {
                let num1, num2, num3, op1, op2, intermediate, finalResult;
                do {
                    num1 = Math.floor(Math.random() * 20) + 1;
                    num2 = Math.floor(Math.random() * 20) + 1;
                    num3 = Math.floor(Math.random() * 20) + 1;
                    op1 = Math.random() > 0.5 ? '+' : '-';
                    op2 = Math.random() > 0.5 ? '+' : '-';
                    
                    intermediate = op1 === '+' ? num1 + num2 : num1 - num2;
                    finalResult = op2 === '+' ? intermediate + num3 : intermediate - num3;
                    
                } while (
                    intermediate < 0 || intermediate > 25 || // Ensure intermediate result is non-negative and within range
                    finalResult < 0 || finalResult > 25
                );
                
                correctAnswer = finalResult;
                document.getElementById('question').innerText = `${num1} ${op1} ${num2} ${op2} ${num3} =`;
            }
            document.getElementById('answer').value = '';
            document.getElementById('feedback').innerText = '';

            // Re-enable controls for the new question
            document.getElementById('answer').disabled = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('answer').focus(); // Focus input for better UX
        }

        function checkAnswer() {
            const userAns = parseInt(document.getElementById('answer').value);
            const feedback = document.getElementById('feedback');

            if (userAns === correctAnswer) {
                // Disable controls to prevent re-submission during timeout
                document.getElementById('answer').disabled = true;
                document.getElementById('submit-btn').disabled = true;

                streakCounter++; // Increment the streak counter
                updateStreakDisplay();

                const rewards = currentTheme === 'brawlers' ? brawlers : demonHunters;
                const randomReward = rewards[Math.floor(Math.random() * rewards.length)];
                
                const winMessage = currentTheme === 'brawlers' 
                    ? `זכית ב-${randomReward.name} ${randomReward.icon}` 
                    : `גייסת את ${randomReward.name} ${randomReward.icon} ללהקה!`;

                feedback.innerHTML = `<span style="color:green">נכון מאוד! ${winMessage}</span>`;
                addToInventory(randomReward);
                if (streakCounter > 0 && streakCounter % 3 === 0) {
                    fireConfetti(); // Trigger confetti on a streak of 3!
                }
                setTimeout(newQuestion, 2000);
            } else {
                // למידה מטעות
                streakCounter = 0; // Reset streak on wrong answer
                updateStreakDisplay();
                if (currentMode === 'multiply') {
                    feedback.innerHTML = `<span style="color:red">כמעט! רמז: נסה לחשב ${currentNum2} ועוד ${currentNum2} (ככה ${currentNum1} פעמים)</span>`;
                } else {
                    feedback.innerHTML = `<span style="color:red">כמעט! רמז: חשב קודם את שני המספרים הראשונים, ואז את השלישי.</span>`;
                }
            }
        }

        function updateStreakDisplay() {
            const streakEl = document.getElementById('streak-counter');
            streakEl.innerText = streakCounter;
            const container = document.getElementById('streak-container');
            if (streakCounter > 0) {
                container.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    container.style.transform = 'scale(1)';
                }, 200);
            }
        }

        function addToInventory(reward) {
            const currentCollection = inventories[currentTheme];
            currentCollection.push(reward);
            saveProgress();

            // Add to the DOM
            const inv = document.getElementById('inventory');
            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = `${reward.icon}<br>${reward.name}`;
            inv.appendChild(item);
            updateCharacterCountDisplay();
        }

        // Confetti function (adapted from the bowling game)
        function fireConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 30; i++) { // Generate 30 confetti pieces
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                // Random starting position across the top of the screen
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-10px'; // Start just above the viewport
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                // Random animation duration for varied fall speeds
                confetti.style.animationDuration = (Math.random() * 2 + 1) + 's'; // 1 to 3 seconds
                document.body.appendChild(confetti);
                
                // Remove confetti after its animation finishes to clean up the DOM
                setTimeout(() => confetti.remove(), parseFloat(confetti.style.animationDuration) * 1000);
            }
        }

        // Initial load
        function init() {
            loadProgress();
            // Set default theme visuals on first load
            document.body.classList.remove('theme-demons');
            document.getElementById('main-title').innerText = '🌵 BRAWL MULTIPLY 🌵';
            document.getElementById('subtitle').innerText = 'פתור תרגילים וזכה בבראולרים נדירים!';
            document.getElementById('collection-title').innerText = 'האוסף שלי:';
            displayCurrentInventory();
            displayPurchasedTrophies();
            updateCharacterCountDisplay();
            newQuestion();
        }

        // Event Listeners
        settingsBtn.addEventListener('click', openSettings);
        modalOkBtn.addEventListener('click', applyAndCloseSettings);
        storeBtn.addEventListener('click', openStore);
        storeCloseBtn.addEventListener('click', closeStore);

        init();
    </script>
</body>
</html>
